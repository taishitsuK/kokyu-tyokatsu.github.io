<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プレビューシミュレーター | 呼吸×腸活の完全ロードマップ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f11;
            --panel-bg: rgba(255, 255, 255, 0.08);
            --panel-border: rgba(255, 255, 255, 0.12);
            --text-color: #f5f5f7;
            --accent-color: #0066cc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* コントロールパネル */
        .control-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            padding: 6px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .btn-toggle {
            background: transparent;
            border: none;
            color: #86868b;
            padding: 8px 18px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .btn-toggle:hover {
            color: var(--text-color);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-toggle.active {
            color: #ffffff;
            background: var(--accent-color);
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.3);
        }

        /* プレビュー表示エリア */
        .viewport-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #1c1c1e;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            padding: 0;
        }

        /* iframeのラッパー（デバイスフレーム） */
        .device-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* PCモード時のスタイル */
        .device-wrapper.mode-pc {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 0;
            box-shadow: none;
        }

        /* スマホモード時のスタイル */
        .device-wrapper.mode-sp {
            width: 375px;
            height: 812px;
            border: 12px solid #000000;
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            background: #000;
        }

        .device-wrapper.mode-sp::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #000000;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 10;
        }

        .device-wrapper.mode-sp::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            z-index: 10;
        }

        .preview-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
            transition: border-radius 0.5s ease;
        }

        .device-wrapper.mode-pc .preview-iframe {
            border-radius: 0;
        }

        .device-wrapper.mode-sp .preview-iframe {
            border-radius: 28px;
        }

        /* デモ注記 */
        .demo-notice {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #86868b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <button id="btn-pc" class="btn-toggle active" onclick="setMode('pc')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
            PC表示
        </button>
        <button id="btn-sp" class="btn-toggle" onclick="setMode('sp')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
            スマホ表示
        </button>
    </div>

    <div class="viewport-container" id="viewport">
        <div class="device-wrapper mode-pc" id="device-wrapper">
            <iframe src="lp.html" class="preview-iframe" id="preview-iframe"></iframe>
        </div>
    </div>

    <div class="demo-notice">
        ※この切り替え機能はデモ確認用です。本番公開時は lp.html をそのまま index.html としてご使用いただけます。
    </div>

    <script>
        function setMode(mode) {
            const wrapper = document.getElementById('device-wrapper');
            const btnPc = document.getElementById('btn-pc');
            const btnSp = document.getElementById('btn-sp');
            const viewport = document.getElementById('viewport');

            if (mode === 'pc') {
                wrapper.className = 'device-wrapper mode-pc';
                btnPc.classList.add('active');
                btnSp.classList.remove('active');
                viewport.style.padding = '0';
            } else if (mode === 'sp') {
                wrapper.className = 'device-wrapper mode-sp';
                btnSp.classList.add('active');
                btnPc.classList.remove('active');
                viewport.style.padding = '40px 20px';
            }
        }
        
        setMode('pc');
    </script>
</body>
</html>
